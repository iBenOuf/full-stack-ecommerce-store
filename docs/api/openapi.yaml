  /report:
    get:
      tags:
        - Reports
      summary: Get sales report
      description: Get comprehensive sales report (admin only)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Start date for reports (ISO format)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: End date for reports (ISO format)
      responses:
        '200':
          description: Sales report generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sales report generated successfully"
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                        properties:
                          totalSales:
                            type: number
                          totalOrders:
                            type: integer
                          totalItemsSold:
                            type: integer
                          totalCustomers:
                            type: integer
                          totalProducts:
                            type: integer
                      topProducts:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            name:
                              type: string
                            totalSold:
                              type: integer
                            revenue:
                              type: number
                      salesTrends:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            dailySales:
                              type: number
                            orderCount:
                              type: integer
                      recentOrders:
                        type: array
                        items:
                          type: object
                          properties:
                            user:
                              type: string
                            status:
                              type: string
                            totalAmount:
                              type: number
                            createdAt:
                              type: string
                              format: date-time
                      lowStockProducts:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            stockQuantity:
                              type: integer
                            price:
                              type: number
                      categoryDistribution:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            revenue:
                              type: number
                            count:
                              type: integer
