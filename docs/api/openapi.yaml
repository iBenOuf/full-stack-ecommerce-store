openapi: 3.0.3
info:
  title: Maison & Co E-Commerce API
  description: |
    RESTful API for a modern, full-featured e-commerce platform with admin dashboard,
    real-time notifications, and dynamic content management.

    ## Authentication
    Most endpoints require a JWT token passed in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Tokens are obtained via the `/auth/login` or `/auth/register` endpoints and expire after 1 day.

    ## Roles
    - **customer** — Browse, purchase, manage own data
    - **moderator** — Customer + manage testimonials, FAQs
    - **admin** — Full access to all endpoints

    ## Base URL
    ```
    https://your-backend-url.com/api/v1
    ```

    ## Pagination
    List endpoints support pagination via query parameters:
    - `page` — Page number (default: 1)
    - `limit` — Items per page (default: 10)
    - `sort` — Sort field (e.g., `createdAtDESC`, `priceASC`)
    - `filter` — Search term
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/iBenOuf/full-stack-ecommerce-store
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Development
  - url: https://your-backend-url.com/api/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Health
    description: API health check
  - name: Auth
    description: User authentication and registration
  - name: Users
    description: User management (admin)
  - name: Products
    description: Product catalog and management
  - name: Orders
    description: Order creation and tracking
  - name: Cart
    description: Shopping cart operations
  - name: Categories
    description: Product categories
  - name: Subcategories
    description: Product subcategories
  - name: Addresses
    description: User shipping addresses
  - name: Testimonials
    description: Customer reviews and testimonials
  - name: FAQs
    description: Frequently asked questions
  - name: Pages
    description: Dynamic content pages
  - name: Notifications
    description: Real-time admin notifications
  - name: Site Config
    description: Site customization and configuration
  - name: Reports
    description: Sales analytics and reports

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: "Validation error message"
      required:
        - message

    User:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [male, female]
        role:
          type: string
          enum: [customer, moderator, admin]
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        stockQuantity:
          type: integer
        imageUrl:
          type: string
        subcategory:
          $ref: '#/components/schemas/Subcategory'
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subcategory:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Category'
        image:
          type: string
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        _id:
          type: string
        user:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/User'
        items:
          type: array
          items:
            type: object
            properties:
              product:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/Product'
              snapshot:
                type: object
                properties:
                  name:
                    type: string
                  imageUrl:
                    type: string
              quantity:
                type: integer
              unitPrice:
                type: number
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            governorate:
              type: string
        deliveryPhone:
          type: string
        status:
          type: string
          enum: [pending, preparing, shipped, delivered, canceled_by_client, canceled_by_admin, rejected, returned]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Cart:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              product:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/Product'
              quantity:
                type: integer
              unitPrice:
                type: number

    Address:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        label:
          type: string
        street:
          type: string
        city:
          type: string
        governorate:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Testimonial:
      type: object
      properties:
        _id:
          type: string
        user:
          type: object
          properties:
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    FAQ:
      type: object
      properties:
        _id:
          type: string
        question:
          type: string
        answer:
          type: string
        order:
          type: integer
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Page:
      type: object
      properties:
        _id:
          type: string
        pageSlug:
          type: string
        title:
          type: string
        content:
          type: string
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
        type:
          type: string
          enum: [new_order, low_stock, new_testimonial, order_canceled]
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        ref:
          type: string
        refModel:
          type: string
          enum: [Order, Product, Testimonial]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SiteConfig:
      type: object
      properties:
        _id:
          type: string
        announcement:
          type: string
        siteName:
          type: string
        heroSection:
          type: object
          properties:
            heroSlogan:
              type: string
            heroTitle:
              type: object
              properties:
                line1:
                  type: string
                line2:
                  type: string
                line3:
                  type: string
            heroDescription:
              type: string
            heroImage:
              type: string
            season:
              type: string
        aboutSection:
          type: object
          properties:
            aboutSlogan:
              type: string
            aboutTitle:
              type: object
              properties:
                line1:
                  type: string
                line2:
                  type: string
                line3:
                  type: string
            aboutDescription:
              type: string
            analytics:
              type: object
              properties:
                stat1:
                  type: object
                  properties:
                    value:
                      type: string
                    label:
                      type: string
                stat2:
                  type: object
                  properties:
                    value:
                      type: string
                    label:
                      type: string
                stat3:
                  type: object
                  properties:
                    value:
                      type: string
                    label:
                      type: string
                stat4:
                  type: object
                  properties:
                    value:
                      type: string
                    label:
                      type: string
        footerSection:
          type: object
          properties:
            footerText:
              type: string
            socialLinks:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  url:
                    type: string
            contactEmail:
              type: string
            contactPhone:
              type: string
            copyrightText:
              type: string
            paymentMethods:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
        coreValues:
          type: array
          items:
            type: object
            properties:
              icon:
                type: string
              title:
                type: object
                properties:
                  en:
                    type: string
              description:
                type: object
                properties:
                  en:
                    type: string
        shippingPolicy:
          type: object
          properties:
            title:
              type: object
              properties:
                en:
                  type: string
            freeShipping:
              type: object
              properties:
                en:
                  type: string
            standardDelivery:
              type: object
              properties:
                en:
                  type: string
            returnsPolicy:
              type: object
              properties:
                en:
                  type: string
            returnsDays:
              type: integer
        footerLinks:
          type: array
          items:
            type: object
            properties:
              section:
                type: object
                properties:
                  en:
                    type: string
              links:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: object
                      properties:
                        en:
                          type: string
                    url:
                      type: string
        shopPage:
          type: object
          properties:
            heading:
              type: object
              properties:
                en:
                  type: string
            subtitle:
              type: object
              properties:
                en:
                  type: string
        contactPage:
          type: object
          properties:
            eyebrow:
              type: object
              properties:
                en:
                  type: string
            heading:
              type: object
              properties:
                en:
                  type: string
            subtitle:
              type: object
              properties:
                en:
                  type: string
            emailHeading:
              type: object
              properties:
                en:
                  type: string
            emailDesc:
              type: object
              properties:
                en:
                  type: string
            phoneHeading:
              type: object
              properties:
                en:
                  type: string
            phoneDesc:
              type: object
              properties:
                en:
                  type: string
            visitHeading:
              type: object
              properties:
                en:
                  type: string
            visitDesc:
              type: object
              properties:
                en:
                  type: string
            socialEyebrow:
              type: object
              properties:
                en:
                  type: string
            socialHeading:
              type: object
              properties:
                en:
                  type: string
            faqText:
              type: object
              properties:
                en:
                  type: string
            faqLinkText:
              type: object
              properties:
                en:
                  type: string
        faqPage:
          type: object
          properties:
            heading:
              type: object
              properties:
                en:
                  type: string
            subtitle:
              type: object
              properties:
                en:
                  type: string
            footerText:
              type: object
              properties:
                en:
                  type: string
            footerButtonText:
              type: object
              properties:
                en:
                  type: string
        notFoundPage:
          type: object
          properties:
            eyebrow:
              type: object
              properties:
                en:
                  type: string
            heading:
              type: object
              properties:
                en:
                  type: string
            subtitle:
              type: object
              properties:
                en:
                  type: string
            suggestionsHeading:
              type: object
              properties:
                en:
                  type: string
            suggestions:
              type: array
              items:
                type: object
                properties:
                  label:
                    type: object
                    properties:
                      en:
                        type: string
                  url:
                    type: string
        navLinks:
          type: array
          items:
            type: object
            properties:
              label:
                type: object
                properties:
                  en:
                    type: string
              url:
                type: string
              queryParams:
                type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

  parameters:
    pagination:
      in: query
      name: page
      schema:
        type: integer
        default: 1
      description: Page number
    limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 10
      description: Items per page
    sort:
      in: query
      name: sort
      schema:
        type: string
        enum: [createdAtASC, createdAtDESC, priceASC, priceDESC, nameASC, nameDESC, stockASC, stockDESC]
        default: createdAtDESC
      description: Sort order
    filter:
      in: query
      name: filter
      schema:
        type: string
      description: Search term (searches name and description)
    categorySlug:
      in: query
      name: categorySlug
      schema:
        type: string
      description: Filter by category slug
    subcategorySlug:
      in: query
      name: subcategorySlug
      schema:
        type: string
      description: Filter by subcategory slug
    inStock:
      in: query
      name: inStock
      schema:
        type: string
        enum: ['true']
      description: Filter to show only in-stock items
    status:
      in: query
      name: status
      schema:
        type: string
      description: Filter by status
    stockStatus:
      in: query
      name: stockStatus
      schema:
        type: string
        enum: [in, low, out]
      description: Filter by stock status
    startDate:
      in: query
      name: startDate
      schema:
        type: string
        format: date
      description: Start date for reports (ISO format)
    endDate:
      in: query
      name: endDate
      schema:
        type: string
        format: date
      description: End date for reports (ISO format)
    pathId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: MongoDB ObjectId
    pathSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
      description: URL slug
    pathProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
      description: Product MongoDB ObjectId

paths:
  /:
    get:
      tags:
        - Health
      summary: API health check
      description: Returns API status and timestamp
      security: []
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API is running"
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new customer
      description: Creates a new customer account and returns user data
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 30
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 30
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
                phone:
                  type: string
                gender:
                  type: string
                  enum: [male, female]
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registered successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register/moderator:
    post:
      tags:
        - Auth
      summary: Register a new moderator
      description: Creates a new moderator account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 30
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 30
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
                phone:
                  type: string
                gender:
                  type: string
                  enum: [male, female]
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registered successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register/admin:
    post:
      tags:
        - Auth
      summary: Register a new admin
      description: Creates a new admin account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 30
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 30
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
                phone:
                  type: string
                gender:
                  type: string
                  enum: [male, female]
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registered successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates user and returns JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged in successfully"
                  token:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Returns the authenticated user's profile
      responses:
        '200':
          description: User fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User fetched successfully"
                  data:
                    $ref: '#/components/schemas/User'

  /user/all:
    get:
      tags:
        - Users
      summary: Get all users
      description: Returns all users (admin only)
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Users fetched successfully"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /user/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Users can fetch themselves; admins can fetch any user
      parameters:
        - $ref: '#/components/parameters/pathId'
      responses:
        '200':
          description: User fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User fetched successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Users
      summary: Update user
      description: Users can only update themselves
      parameters:
        - $ref: '#/components/parameters/pathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 30
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 30
                phone:
                  type: string
                gender:
                  type: string
                  enum: [male, female]
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User updated successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Users
      summary: Delete user
      description: Soft-delete a user (admin only)
      parameters:
        - $ref: '#/components/parameters/pathId'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User deleted successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{id}/password:
    patch:
      tags:
        - Users
      summary: Update user password
      description: Users can only update their own password
      parameters:
        - $ref: '#/components/parameters/pathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 32
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
