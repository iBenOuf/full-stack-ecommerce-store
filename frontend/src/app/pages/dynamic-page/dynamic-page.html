<div class="dynamic-page">
  @if (isLoading) {
    <div class="loading-state">
      <div class="spinner"></div>
    </div>
  } @else if (page) {
    <div class="page-container">
      <div class="page-header">
        <h1>{{ page.title }}</h1>
      </div>
      <div class="page-content" [innerHTML]="safeContent"></div>
    </div>
  }
</div>
